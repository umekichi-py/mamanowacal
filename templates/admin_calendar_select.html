<form method="get" action="{{ url_for('admin_calendar_view') }}">

    <div class="field">
        <label>カレンダー</label>

        <div class="control">
            <div class="select">
                <select name="mode">
                    <option value="holiday">休み希望</option>
                    <option value="workday">出勤希望</option>
                    <option value="childday">預かり希望</option>
                </select>
            </div>
        </div>

    </div>

    <div class="field">
        <label>月</label>
        <input type="month" name="month" value="{{ default_month }}">
    </div>

    <button class="button is-primary">表示</button>

    <div class="m-3">
        <a href="{{ url_for('admin_page') }}" class="button is-light">
            ←管理者ページに戻る
        </a>

    </div>

</form>
