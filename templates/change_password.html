<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
<title>パスワード変更</title>
</head>

<body>

<section class="hero is-warning">
<div class="hero-body has-text-centered">
<p class="title">パスワード変更</p>
</div>
</section>

<section class="section">
<div class="container" style="max-width:400px">

<!-- flash表示 -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        <div class="notification is-{{ category }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<div class="field">
<label class="label">現在のパスワード</label>
<input class="input" type="password" name="current_pw" required>
</div>

<div class="field">
<label class="label">新しいパスワード</label>
<input class="input" type="password" name="new_pw" required>
</div>

<div class="field">
<label class="label">新しいパスワード（確認）</label>
<input class="input" type="password" name="confirm_pw" required>
</div>

<button class="button is-warning is-fullwidth">
変更
</button>

</form>

<br>

<a href="{{ url_for('home') }}" class="button is-light is-fullwidth">
ホームへ戻る
</a>

</div>
</section>

</body>
</html>
