{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}

<div class="columns is-centered">
    <div class="column is-4">

        <div class="card">
            <header class="card-header has-background-primary">
                <p class="card-header-title has-text-white">
                    ままのわシフトボード
                </p>
            </header>

            <div class="card-content">
                <form method="POST">

                    <div class="field">
                        <label class="label">ユーザー名</label>
                        <div class="control">
                            <input class="input"
                                   type="text"
                                   name="username"
                                   placeholder="ユーザー名"
                                   required>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">パスワード</label>
                        <div class="control">
                            <input class="input"
                                   type="password"
                                   name="password"
                                   placeholder="パスワード"
                                   required>
                        </div>
                    </div>

                    <div class="field mt-4">
                        <div class="control">
                            <button class="button is-primary is-fullwidth">
                                ログイン
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
